name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Typecheck, Unit Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: heron
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: heron/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - name: Build (smoke check)
        env:
          NEXT_PUBLIC_IMAGE_BASE_URL: http://localhost:9000/cms
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-dummy-secret
        run: npm run build

  e2e:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: heron/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: heron

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: heron

      - name: Run E2E tests
        run: npm run test:e2e:docker
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: heron/playwright-report/
          retention-days: 7
