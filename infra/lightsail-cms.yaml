AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Heron Lightsail CMS (VM + attached data disk + S3 + CloudFront).
  SQLite lives on the attached disk at /var/lib/heron-cms/data so VM replacements
  can reattach the same disk instead of copying the database.
  Prefer replacing the VM via heron-runtime-* instance snapshots (see docs/DEPLOY_RUNTIME_IMAGE.md).
  Do not change LightsailBlueprintId on a live stack to migrate hosts — that may replace the instance.

Parameters:
  LightsailInstanceName:
    Type: String
    Default: heron-cms
  LightsailBlueprintId:
    Type: String
    Default: nodejs
    Description: >
      Blueprint for CloudFormation-managed instance create only.
      Production cutover should use a custom heron-runtime snapshot (console/CLI), not a blueprint change here.
      Run aws lightsail get-blueprints to list IDs.
  LightsailBundleId:
    Type: String
    Default: nano_3_0
  LightsailAvailabilityZone:
    Type: String
    Description: >
      AZ of the Lightsail instance (e.g. us-east-1a). Required so the data disk is
      created in the same zone. Deploy workflow resolves this automatically.
  DataDiskName:
    Type: String
    Default: heron-cms-data
  DataDiskSizeGb:
    Type: Number
    Default: 8
    MinValue: 8
    Description: Lightsail block storage size (GB). 8 GB is the minimum (~$0.80/mo).
  StaticIpName:
    Type: String
    Default: heron-cms-ip
  BucketName:
    Type: String
  KeyPairName:
    Type: String
    Description: Name of the Lightsail SSH key pair to use for the instance
  CloudFrontPriceClass:
    Type: String
    Default: PriceClass_100

Resources:
  CmsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CmsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: CmsDistribution
    Properties:
      Bucket: !Ref CmsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: "s3:GetObject"
            Resource: !Sub "${CmsBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CmsDistribution}"
  CmsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CmsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: !Ref CloudFrontPriceClass
        Origins:
          - Id: CmsS3Origin
            DomainName: !GetAtt CmsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref CmsOAC
        DefaultCacheBehavior:
          TargetOriginId: CmsS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        DefaultRootObject: ""

  CmsDataDisk:
    Type: AWS::Lightsail::Disk
    Properties:
      DiskName: !Ref DataDiskName
      SizeInGb: !Ref DataDiskSizeGb
      AvailabilityZone: !Ref LightsailAvailabilityZone
      Tags:
        - Key: Purpose
          Value: heron-cms-sqlite

  CmsInstance:
    Type: AWS::Lightsail::Instance
    DependsOn: CmsDataDisk
    Properties:
      InstanceName: !Ref LightsailInstanceName
      BlueprintId: !Ref LightsailBlueprintId
      BundleId: !Ref LightsailBundleId
      KeyPairName: !Ref KeyPairName
      # Attaching/detaching a disk restarts the instance (static IP stays if attached).
      Hardware:
        Disks:
          - DiskName: !Ref DataDiskName
            Path: /dev/xvdf
      UserData: |
        #!/bin/bash
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        echo "[startup] Creating app and data directories..."
        mkdir -p /opt/heron-cms /var/lib/heron-cms/data
        if id -u bitnami >/dev/null 2>&1; then
          chown -R bitnami:bitnami /opt/heron-cms /var/lib/heron-cms
        elif id -u ubuntu >/dev/null 2>&1; then
          chown -R ubuntu:ubuntu /opt/heron-cms /var/lib/heron-cms
        fi
        touch /var/lib/heron-cms/.startup-done
        echo "[startup] Installing utilities..."
        apt-get update -y 2>/dev/null || true
        apt-get install -y rsync git unzip jq 2>/dev/null || true
        echo "[startup] Done."

  CmsStaticIp:
    Type: AWS::Lightsail::StaticIp
    DependsOn: CmsInstance
    Properties:
      StaticIpName: !Ref StaticIpName
      AttachedTo: !Ref CmsInstance

  # Managed policy for the CMS app IAM user (S3 uploads + AI alt text via Bedrock).
  # Already attached to that user; stack updates refresh permissions in place.
  CmsS3UploaderPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-cms-s3-uploader"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowObjectWriteReadDelete
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::${CmsBucket}/*"
          - Sid: AllowListBucket
            Effect: Allow
            Action: s3:ListBucket
            Resource: !Sub "arn:aws:s3:::${CmsBucket}"
          - Sid: AllowBedrockInvokeNovaLite
            Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource:
              - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-lite-v1:0"

Outputs:
  CloudFrontDomain:
    Value: !GetAtt CmsDistribution.DomainName
  S3PublicBaseURL:
    Value: !Sub "https://${CmsDistribution.DomainName}"
  LightsailStaticIp:
    Value: !GetAtt CmsStaticIp.IpAddress
  S3Bucket:
    Value: !Ref CmsBucket
  CmsDataDiskName:
    Value: !Ref DataDiskName
  CmsS3UploaderPolicyArn:
    Description: "CMS app IAM managed policy (S3 + AI alt text)."
    Value: !Ref CmsS3UploaderPolicy
